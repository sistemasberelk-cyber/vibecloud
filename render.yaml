# render.yaml — VibeCloud Enterprise
# Infrastructure as Code — 5 servicios
# Generado: 2026-07-02

services:

  # ── 1. VibeCloud: FastAPI + Python ──────────────────────
  - type: web
    name: vibecloud-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: >
      uvicorn main:app
      --host 0.0.0.0
      --port $PORT
      --workers 2
      --log-level info
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # ← setear en Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MEDUSA_URL
        fromService:
          name: vibecloud-medusa
          type: web
          property: url
      - key: MEDUSA_ADMIN_API_KEY
        sync: false
      - key: VIBECLOUD_API_KEY
        generateValue: true  # ← Render genera automáticamente
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # ── 2. Worker: retry de sync_queue ───────────────────
  - type: worker
    name: vibecloud-sync-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python workers/sync_queue_worker.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MEDUSA_URL
        fromService:
          name: vibecloud-medusa
          type: web
          property: url
      - key: MEDUSA_ADMIN_API_KEY
        sync: false
      - key: VIBECLOUD_API_KEY
        sync: false

  # ── 3. Medusa: Node.js E-commerce ────────────────────
  - type: web
    name: vibecloud-medusa
    runtime: node
    plan: starter
    rootDir: medusa-develop
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health/ready
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: vibecloud-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: MEDUSA_ADMIN_API_KEY
        generateValue: true
      - key: VIBECLOUD_API_URL
        fromService:
          name: vibecloud-backend
          type: web
          property: url
      - key: VIBECLOUD_API_KEY
        fromService:
          name: vibecloud-backend
          type: web
          envVarKey: VIBECLOUD_API_KEY
      - key: STORE_CORS
        fromService:
          name: vibecloud-storefront
          type: web
          property: url
      - key: ADMIN_CORS
        fromService:
          name: vibecloud-storefront
          type: web
          property: url
      - key: NODE_ENV
        value: production

  # ── 4. Storefront: Next.js B2C ────────────────────────
  - type: web
    name: vibecloud-storefront
    runtime: node
    plan: starter
    rootDir: storefront
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_MEDUSA_URL
        fromService:
          name: vibecloud-medusa
          type: web
          property: url
      - key: NEXT_PUBLIC_VIBECLOUD_URL
        fromService:
          name: vibecloud-backend
          type: web
          property: url
      - key: NODE_ENV
        value: production

  # ── 5. Redis: Background Jobs Medusa ─────────────────
  - type: redis
    name: vibecloud-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []          # solo acceso interno entre servicios
